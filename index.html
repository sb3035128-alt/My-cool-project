<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Mega Store</title>

<style>
/* ================= GLOBAL STYLES ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#eef2f7}

header{
  background:#0f172a;
  color:#fff;
  padding:15px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:center;
}

header h2{font-size:22px}

header input{
  padding:10px;
  width:250px;
  border:none;
  border-radius:6px;
}

#cartCount{
  background:red;
  padding:5px 10px;
  border-radius:50%;
}

.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  padding:20px;
}

.card{
  background:#fff;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  overflow:hidden;
  transition:.3s;
}

.card:hover{transform:translateY(-5px)}

.card img{width:100%;height:200px;object-fit:cover}

.card-content{padding:15px}

.price{color:#16a34a;font-weight:bold}
.rating{color:orange}
.desc{font-size:13px;color:#555;height:40px;overflow:hidden}

button{
  margin-top:10px;
  padding:10px;
  width:100%;
  border:none;
  background:#0f172a;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

/* ================= MODAL ================= */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-content{
  background:#fff;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:500px;
}

.close{cursor:pointer;font-size:20px;float:right}

/* ================= CART ================= */
#cartBox{
  position:fixed;
  right:-400px;
  top:0;
  width:300px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 10px rgba(0,0,0,0.2);
  padding:15px;
  transition:.4s;
  overflow:auto;
}

#cartBox.active{right:0}

/* ================= RESPONSIVE ================= */
@media(max-width:600px){
  header{flex-direction:column;gap:10px}
}
</style>
</head>

<body>

<header>
  <h2>🚀 Ultimate Store</h2>
  <input type="text" id="search" placeholder="Search product...">
  <button onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
</header>

<div class="container" id="products"></div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <div id="modalData"></div>
  </div>
</div>

<!-- CART -->
<div id="cartBox">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <h4 id="total"></h4>
</div>

<script>
// ================= DATA =================
function generateProducts(n){
  let arr=[]
  for(let i=1;i<=n;i++){
    arr.push({
      id:i,
      name:`Product ${i}`,
      price:(Math.random()*3000+100).toFixed(0),
      rating:(Math.random()*5).toFixed(1),
      category:["Electronics","Fashion","Home","Sports"][i%4],
      desc:`Short description of product ${i}`,
      full:`Full detailed description of product ${i}. Includes features, specifications, durability, warranty and performance details.`,
      img:`https://picsum.photos/300/200?random=${i}`
    })
  }
  return arr
}

let products = generateProducts(1000)
let cart = JSON.parse(localStorage.getItem("cart")) || []

// ================= DISPLAY =================
const container = document.getElementById("products")
function display(list){
  container.innerHTML = list.map(p=>`
    <div class="card">
      <img src="${p.img}">
      <div class="card-content">
        <h3>${p.name}</h3>
        <div class="price">₹${p.price}</div>
        <div class="rating">⭐ ${p.rating}</div>
        <div class="desc">${p.desc}</div>
        <button onclick="view(${p.id})">Details</button>
      </div>
    </div>
  `).join("")
}

// ================= MODAL =================
function view(id){
  const p = products.find(x=>x.id===id)
  modal.style.display="flex"
  modalData.innerHTML=`
    <h2>${p.name}</h2>
    <img src="${p.img}" style="width:100%">
    <p>Price: ₹${p.price}</p>
    <p>Rating: ${p.rating}</p>
    <p>${p.full}</p>
    <button onclick="addToCart(${p.id})">Add to Cart</button>
  `
}

function closeModal(){modal.style.display="none"}

// ================= CART =================
function addToCart(id){
  cart.push(id)
  localStorage.setItem("cart",JSON.stringify(cart))
  updateCart()
}

function updateCart(){
  document.getElementById("cartCount").innerText = cart.length
  let html=""
  let total=0

  cart.forEach(id=>{
    let p = products.find(x=>x.id===id)
    total += Number(p.price)
    html += `<p>${p.name} - ₹${p.price}</p>`
  })

  cartItems.innerHTML = html
  totalBox = document.getElementById("total")
  totalBox.innerText = "Total: ₹" + total
}

function toggleCart(){
  document.getElementById("cartBox").classList.toggle("active")
}

// ================= SEARCH =================
document.getElementById("search").addEventListener("input",e=>{
  let val = e.target.value.toLowerCase()
  let filtered = products.filter(p=>p.name.toLowerCase().includes(val))
  display(filtered)
})

// ================= INIT =================
display(products)
updateCart()
</script>

</body>
</html>
